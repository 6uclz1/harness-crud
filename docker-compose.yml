services:
  db:
    image: postgres:18-alpine
    container_name: harness-crud-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: harness_crud
    ports:
      - "5432:5432"
    volumes:
      # postgres 18からVOLUME宣言が /var/lib/postgresql に変更された(PGDATAはバージョン固有パス)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d harness_crud"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
