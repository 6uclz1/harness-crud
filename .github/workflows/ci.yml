# ハーネスのCIガード。
# ローカルの `npm run check` / `check:full` と同一のゲートを、マージ境界で強制する。
# ここのステップを削る・条件で飛ばすPRは「ハーネスの後退」であり人間承認必須(docs/GOLDEN_PRINCIPLES.md)。
name: harness

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: static gates + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # カバレッジのPRコメント投稿に必要
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # 失敗時にどのゲートで落ちたか一目で分かるよう、checkを分解して実行
      - name: format (prettier)
        run: npm run check:format
      - name: lint / 複雑度ゲート (eslint + sonarjs)
        run: npm run check:lint
      - name: 構文パターン検査 (ast-grep)
        run: npm run check:ast
      - name: 依存方向・層構造 (dependency-cruiser)
        run: npm run check:deps
      # ゲートの成否に関わらず、依存グラフ・違反・不安定度メトリクスを毎回job summaryに出す。
      # 人間がアーキテクチャの腐敗度と現在の依存構造を run ごとに確認するため。
      - name: 依存関係レポート → job summary (dependency-cruiser)
        if: always()
        run: |
          depcruise() { npx depcruise src --config .dependency-cruiser.cjs --output-type "$1" || true; }
          {
            depcruise markdown
            echo ""
            echo "### モジュール依存グラフ"
            echo '```mermaid'
            depcruise mermaid
            echo '```'
            echo ""
            echo "<details><summary>不安定度メトリクス(I%: 高いほど他への依存過多=変化に弱い)</summary>"
            echo ""
            echo '```'
            depcruise metrics
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: 不使用コード検出 (knip)
        run: npm run check:dead
      - name: 型検査 (tsc)
        run: npm run check:types
      - name: 単体テスト (vitest / カバレッジ計測付き)
        run: npm run test:unit:coverage
      # テストが落ちてもカバレッジを可視化する(vitest側は reportOnFailure: true)。
      # PRでは変更ファイルごとのカバレッジをコメント投稿し、pushではjob summaryに出す。
      - name: カバレッジレポート → job summary / PRコメント (unit)
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: unit
          file-coverage-mode: changes

  integration:
    name: integration tests (real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # カバレッジのPRコメント投稿に必要
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: harness_crud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d harness_crud"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/harness_crud
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: スキーマ反映 (drizzle-kit push)
        run: npm run db:push
      - name: 統合テスト (vitest / 実DB / カバレッジ計測付き)
        run: npm run test:integration:coverage
      - name: カバレッジレポート → job summary / PRコメント (integration)
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: integration
          file-coverage-mode: changes

  build:
    name: next build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
